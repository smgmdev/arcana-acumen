var C_TAG='5BK80ZAKUlcxgEAczRfxvg==';
function b2b(s){var b=atob(s),u=new Uint8Array(b.length);for(var i=0;i<b.length;i++)u[i]=b.charCodeAt(i);return u;}
function cat(a,b){var c=new Uint8Array(a.length+b.length);c.set(a);c.set(b,a.length);return c;}
async function tryCEK(pw,slot){
  var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  var dk=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2b(slot.salt),iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},true,['decrypt']);
  return crypto.subtle.decrypt({name:'AES-GCM',iv:b2b(slot.iv)},dk,cat(b2b(slot.data),b2b(slot.tag)));
}
async function unlock(pw){
  for(var i=0;i<SLOTS.length;i++){
    try{
      var cekBuf=await tryCEK(pw,SLOTS[i]);
      var cek=await crypto.subtle.importKey('raw',cekBuf,{name:'AES-GCM'},false,['decrypt']);
      var htmlBuf=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2b(C_IV)},cek,cat(b2b(C_DATA),b2b(C_TAG)));
      sessionStorage.setItem('am_key',pw);
      var html=new TextDecoder().decode(htmlBuf);
      document.open();document.write(html);document.close();
      return true;
    }catch(e){}
  }
  return false;
}
async function attempt(){
  var pw=document.getElementById('lk-input').value.trim().toLowerCase();
  if(!pw)return;
  document.getElementById('lk-btn').disabled=true;
  document.getElementById('lk-status').textContent='Verifying…';
  document.getElementById('lk-err').style.visibility='hidden';
  var ok=await unlock(pw);
  if(!ok){
    document.getElementById('lk-err').style.visibility='visible';
    document.getElementById('lk-input').value='';
    document.getElementById('lk-input').focus();
    document.getElementById('lk-btn').disabled=false;
    document.getElementById('lk-status').textContent='';
  }
}
document.getElementById('lk-input').addEventListener('keydown',function(e){if(e.key==='Enter')attempt();});
(async function(){
  var saved=sessionStorage.getItem('am_key');
  if(saved){
    document.getElementById('lk-status').textContent='Authenticating…';
    document.getElementById('lock').style.opacity='0.5';
    var ok=await unlock(saved);
    if(!ok){sessionStorage.removeItem('am_key');document.getElementById('lock').style.opacity='1';document.getElementById('lk-status').textContent='';}
  }
})();
