async function unlock(pw){for(var i=0;i<SLOTS.length;i++){try{var cekBuf=await tryCEK(pw,SLOTS[i]);var cek=await crypto.subtle.importKey('raw',cekBuf,{name:'AES-GCM'},false,['decrypt']);var htmlBuf=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2b(C_IV)},cek,cat(b2b(C_DATA),b2b(C_TAG)));sessionStorage.setItem('am_key',pw);document.open();document.write(new TextDecoder().decode(htmlBuf));document.close();return true;}catch(e){}}return false;}
async function attempt(){var pw=document.getElementById('lk-input').value.trim().toLowerCase();if(!pw)return;document.getElementById('lk-btn').disabled=true;document.getElementById('lk-status').textContent='Verifying…';document.getElementById('lk-err').style.visibility='hidden';var ok=await unlock(pw);if(!ok){document.getElementById('lk-err').style.visibility='visible';document.getElementById('lk-input').value='';document.getElementById('lk-input').focus();document.getElementById('lk-btn').disabled=false;document.getElementById('lk-status').textContent='';}}
document.getElementById('lk-input').addEventListener('keydown',function(e){if(e.key==='Enter')attempt();});
(async function(){var saved=sessionStorage.getItem('am_key');if(saved){document.getElementById('lk-status').textContent='Authenticating…';document.getElementById('lock').style.opacity='0.5';var ok=await unlock(saved);if(!ok){sessionStorage.removeItem('am_key');document.getElementById('lock').style.opacity='1';document.getElementById('lk-status').textContent='';}}})();
</script></body></html>
