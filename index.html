<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arcana Mace Government Services</title>
<meta name="description" content="Arcana Mace + Empower is an AI-powered defence intelligence platform delivering real-time orbital threat interception, autonomous laser elimination, and ground scout operations for government and defence agencies.">
<meta name="keywords" content="Arcana Mace, Empower, AI defence, government services, orbital defence grid, threat interception, autonomous laser, ground scout, defence intelligence, military AI, aerial threat elimination, UAE defence, orbital security, sovereign AI">
<meta property="og:title" content="Arcana Mace Government Services">
<meta property="og:description" content="AI-powered defence intelligence platform — AIR ORB MAX &amp; Ground MAX operations.">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:#050810; font-family:Arial,sans-serif; color:#fff; overflow:hidden; }

/* SVG tile background */
html, body { background-color:#0a0a0a; background-image:url('bg-pattern.svg'); background-repeat:repeat; background-size:111px 65px; }

/* content */
#page { position:fixed; inset:0; z-index:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0; visibility:hidden; opacity:0; }



/* top label */
.top-label {
  font-size:0.58rem; letter-spacing:0.35em; color:rgba(255,255,255,0.3);
  text-transform:uppercase; margin-bottom:2.2rem;
  display:flex; align-items:center; gap:12px;
}

/* logo */
.logo-wrap { display:flex; align-items:center; gap:18px; margin-bottom:0.6rem; }
.logo-wrap img { height:72px; filter:brightness(0) invert(1); opacity:0.92; }

/* title */
.main-title {
  font-size:2.6rem; font-weight:400; letter-spacing:0.06em;
  color:#fff; text-align:left; line-height:1.15;
  display:flex; align-items:flex-end; gap:16px;
}
.main-title span { color:#f5c518; }
.main-sub { font-size:1.1rem; font-weight:400; color:rgba(255,255,255,0.4); letter-spacing:0.04em; margin-top:0.3rem; }

/* subtitle */
.subtitle {
  font-size:0.62rem; letter-spacing:0.28em; color:rgba(255,255,255,0.3);
  text-transform:uppercase; margin-top:0.7rem; margin-bottom:3.2rem;
  display:flex; align-items:center; gap:12px;
}



/* password modal */
#auth-overlay {
  display:none; position:fixed; inset:0; z-index:999;
  background:rgba(0,0,0,0.88); backdrop-filter:blur(8px);
  align-items:center; justify-content:center;
}
#auth-overlay.active { display:flex; }
#auth-box {
  background:#0a0d17;
  padding:2.8rem 2.8rem 2.2rem;
  display:flex; flex-direction:column;
  align-items:flex-start;
  width:420px; max-width:92vw;
}
#auth-heading {
  font-size:2rem; font-weight:800; color:#fff; line-height:1.2;
  margin-bottom:0.85rem;
}
#auth-sub {
  font-size:0.88rem; color:rgba(255,255,255,0.55); margin-bottom:1.8rem;
  line-height:1.5;
}
/* input form */
#auth-box { gap:1.1rem; }
#auth-input-wrap { position:relative; width:100%; display:flex; align-items:center; }
#auth-input-icon { position:absolute; left:0.7rem; height:18px; opacity:0.5; filter:brightness(0) invert(1); pointer-events:none; }
#auth-input {
  width:100%; background:#111520; border:1px solid rgba(255,255,255,0.15);
  color:#fff; font-size:0.95rem; font-family:Arial,sans-serif; letter-spacing:0.04em;
  padding:0.75rem 0.9rem 0.75rem 2.8rem; outline:none; caret-color:#2563eb;
  transition:border-color 0.15s;
}
#auth-input:focus { border-color:rgba(37,99,235,0.8); }
#auth-input::placeholder { color:rgba(255,255,255,0.3); font-size:0.9rem; font-family:Arial,sans-serif; letter-spacing:0.03em; }
#auth-err {
  font-size:0.65rem; letter-spacing:0.15em; color:#ff4444;
  text-transform:uppercase; display:none;
}
#auth-submit {
  background:#2563eb; color:#fff; border:none;
  font-size:0.9rem; font-weight:400; letter-spacing:0.04em;
  padding:0.75rem 2rem; cursor:pointer; font-family:Arial,sans-serif;
  align-self:flex-start; transition:background 0.15s;
}
#auth-submit:hover { background:#3b82f6; color:#fff; cursor:pointer; border-color:#3b82f6; }
#auth-submit { transition: background 0.18s, color 0.18s; }


.btn { cursor:pointer; }

/* buttons */
.btn-row { display:flex; gap:1.4rem; align-items:stretch; }
@media(max-width:640px){
  .btn-row { flex-direction:column; gap:1rem; width:100%; padding:0 1.2rem; }
  .btn { width:100%; }
  .main-title { font-size:1.9rem; }
  #page { padding:1rem; }
}

.btn {
  display:flex; flex-direction:column;
  align-items:flex-start;
  text-decoration:none;
  border:1px solid rgba(255,255,255,0.2);
  background:rgba(255,255,255,0.02);
  padding:1.6rem 2rem;
  width:280px;
  position:relative;
  overflow:hidden;
  transition:border-color 0.2s, background 0.2s, transform 0.15s;
  cursor:pointer;
}
.btn::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(to right,transparent,#f5c518,transparent);
  opacity:0; transition:opacity 0.2s;
}
.btn:hover { border-color:rgba(255,255,255,0.4); background:rgba(255,255,255,0.04); transform:translateY(-2px); }
.btn:hover::before { opacity:1; }
.btn:active { transform:translateY(0); }

.btn-tag {
  font-size:0.44rem; letter-spacing:0.22em; color:#fff;
  text-transform:uppercase; margin-bottom:0.8rem;
  background:#c0392b; padding:3px 8px;
}
.btn-name {
  font-size:1.0rem; font-weight:900; color:#fff; letter-spacing:0.04em; line-height:1.3;
  margin-bottom:0.35rem;
}
.btn-sub {
  font-size:0.52rem; letter-spacing:0.14em; color:rgba(255,255,255,0.35);
  text-transform:uppercase; margin-top:auto; margin-bottom:0;
}
.btn-arrow {
  position:absolute; bottom:1.3rem; right:1.4rem;
  font-size:0.7rem; color:#f5c518;
  transition:color 0.2s, transform 0.2s;
}
.btn:hover .btn-arrow { color:#f5c518; transform:translateX(3px); }

/* scan line */
#scan { position:fixed; top:0; left:0; right:0; height:1px; background:linear-gradient(to right,transparent,#f5c518,transparent); animation:scan 4s linear infinite; pointer-events:none; z-index:2; }
@keyframes scan { 0%{top:0%} 100%{top:100%} }

/* version */
.version { display:none; position:fixed; bottom:1.5rem; left:50%; transform:translateX(-50%); font-size:0.42rem; letter-spacing:0.2em; color:rgba(255,255,255,0.15); text-transform:uppercase; z-index:2; white-space:nowrap; }
</style>
</head>

async function sha256(str) {
  var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(16).padStart(2,'0'); }).join('');
}

async function verifyPassword() {
  var raw = document.getElementById('auth-input').value.trim().toLowerCase();
  if (!raw) return;
  var hash = await sha256(raw);
  var matched = VALID_HASHES[hash];
  if (matched) {
    sessionStorage.setItem('am_key', raw);
    closeAuth();
    logAccess(matched, 'homepage');
  } else {
    var errEl = document.getElementById('auth-err');
    errEl.style.display = 'block';
    document.getElementById('auth-input').value = '';
    document.getElementById('auth-input').focus();
  }
}

async function logAccess(passwordLabel, dest) {
  try {
    // Get IP + geo from free API
    var geo = await fetch('https://ipapi.co/json/').then(function(r){ return r.json(); }).catch(function(){ return {}; });
    var payload = {
      ts:         new Date().toISOString(),
      ip:         geo.ip         || 'unknown',
      country:    geo.country_name || 'unknown',
      city:       geo.city       || 'unknown',
      region:     geo.region     || 'unknown',
      lat:        geo.latitude   || null,
      lng:        geo.longitude  || null,
      password_used: passwordLabel,
      module:     dest
    };
    // POST to Supabase
    await fetch(SUPA_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer ' + SUPA_KEY,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(payload)
    });
  } catch(e) {
    // Logging failure must not block navigation
    console.warn('log failed', e);
  }
}
