async function tryCEK(pw,slot){
  var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);

async function unlock(pw){

      var cekBuf=await tryCEK(pw,SLOTS[i]);
      var cek=await crypto.subtle.importKey('raw',cekBuf,{name:'AES-GCM'},false,['decrypt']);
      var htmlBuf=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2b(C_IV)},cek,cat(b2b(C_DATA),b2b(C_TAG)));

}

  var ok=await unlock(pw);
  if(!ok){document.getElementById('lk-err').style.visibility='visible';document.getElementById('lk-input').value='';document.getElementById('lk-input').focus();document.getElementById('lk-btn').disabled=false;document.getElementById('lk-status').textContent='';}
}
document.getElementById('lk-input').addEventListener('keydown',function(e){if(e.key==='Enter')attempt();});
(async function(){
  var saved=sessionStorage.getItem('am_key');
  if(saved){
    document.getElementById('lk-status').textContent='Authenticating…';
    document.getElementById('lock').style.opacity='0.5';
    var ok=await unlock(saved);
    if(!ok){sessionStorage.removeItem('am_key');document.getElementById('lock').style.opacity='1';document.getElementById('lk-status').textContent='';}
  }
})();
</script></body></html>
